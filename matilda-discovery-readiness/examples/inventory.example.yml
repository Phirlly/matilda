version: 1

targets:
  example-direct-linux:
    platform: linux
    os_family: oracle_linux
    cloud_provider: oci
    access_path: direct
    ansible_host: <target-public-ip>
    discovery_ip: <target-private-or-public-ip-used-by-probe>
    public_ip: <target-public-ip>
    private_ip: <target-private-ip>
    privilege_method: sudo
    configure_mode: remote

  example-probe-linux:
    platform: linux
    os_family: oracle_linux
    cloud_provider: oci
    access_path: via_probe
    ansible_host: <target-private-ip>
    discovery_ip: <target-private-ip>
    private_ip: <target-private-ip>
    privilege_method: sudo
    configure_mode: remote
