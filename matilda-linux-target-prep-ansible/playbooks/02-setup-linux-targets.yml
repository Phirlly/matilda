---
- name: Configure Linux targets for Matilda Discovery
  hosts: public_targets:private_targets
  gather_facts: true
  become: true

  tasks:
    - name: Ensure matilda service group exists
      ansible.builtin.group:
        name: "{{ matilda_service_user }}"
        system: true
        state: present

    - name: Ensure matilda service user exists
      ansible.builtin.user:
        name: "{{ matilda_service_user }}"
        group: "{{ matilda_service_user }}"
        home: "{{ matilda_service_home }}"
        shell: /bin/bash
        system: true
        create_home: true
        state: present

    - name: Ensure matilda home ownership and permissions
      ansible.builtin.file:
        path: "{{ matilda_service_home }}"
        state: directory
        owner: "{{ matilda_service_user }}"
        group: "{{ matilda_service_user }}"
        mode: "0700"

    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "{{ matilda_service_home }}/.ssh"
        state: directory
        owner: "{{ matilda_service_user }}"
        group: "{{ matilda_service_user }}"
        mode: "0700"

    - name: Read Matilda public key from runtime-provided path
      ansible.builtin.set_fact:
        matilda_public_key: "{{ lookup('file', matilda_public_key_file) }}"

    - name: Ensure authorized_keys exists
      ansible.builtin.file:
        path: "{{ matilda_service_home }}/.ssh/authorized_keys"
        state: touch
        owner: "{{ matilda_service_user }}"
        group: "{{ matilda_service_user }}"
        mode: "0600"

    - name: Install Matilda discovery public key without duplicates
      ansible.builtin.lineinfile:
        path: "{{ matilda_service_home }}/.ssh/authorized_keys"
        line: "{{ matilda_public_key }}"
        state: present
        owner: "{{ matilda_service_user }}"
        group: "{{ matilda_service_user }}"
        mode: "0600"

    - name: Check if Matilda sudoers file already exists
      ansible.builtin.stat:
        path: "{{ matilda_sudoers_file }}"
      register: matilda_sudoers_stat

    - name: Backup existing Matilda sudoers file if present
      ansible.builtin.copy:
        src: "{{ matilda_sudoers_file }}"
        dest: "{{ matilda_sudoers_file }}.bak"
        remote_src: true
        owner: root
        group: root
        mode: "0440"
      when: matilda_sudoers_stat.stat.exists

    - name: Install Matilda sudoers file with syntax validation
      ansible.builtin.template:
        src: ../templates/matilda-discovery-sudoers.j2
        dest: "{{ matilda_sudoers_file }}"
        owner: root
        group: root
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s

    - name: Validate installed sudoers file
      ansible.builtin.command: "visudo -cf {{ matilda_sudoers_file }}"
      changed_when: false
