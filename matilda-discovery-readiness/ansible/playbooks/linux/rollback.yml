---
- name: Conservative Linux rollback
  hosts: public_targets:private_targets
  gather_facts: false
  become: true

  vars_files:
    - "{{ playbook_dir }}/../../roles/matilda_linux_target/defaults/main.yml"

  tasks:
    - name: Require an explicit rollback mode
      ansible.builtin.assert:
        that:
          - matilda_rollback_mode is defined
          - matilda_rollback_mode in ['sudoers_only', 'remove_key', 'lock_user', 'delete_user']
        fail_msg: "Set matilda_rollback_mode to sudoers_only, remove_key, lock_user, or delete_user."

    - name: Show rollback action
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          mode: "{{ matilda_rollback_mode }}"

    - name: Remove Matilda sudoers drop-in
      ansible.builtin.file:
        path: "{{ matilda_sudoers_file }}"
        state: absent
      when: matilda_rollback_mode == 'sudoers_only'

    - name: Read Matilda public key for authorized_keys rollback
      ansible.builtin.set_fact:
        matilda_public_key: "{{ lookup('file', matilda_public_key_file) }}"
      when: matilda_rollback_mode == 'remove_key'

    - name: Check Matilda authorized_keys file for rollback
      ansible.builtin.stat:
        path: "{{ matilda_service_home }}/.ssh/authorized_keys"
      register: matilda_authorized_keys_stat
      when: matilda_rollback_mode == 'remove_key'

    - name: Remove Matilda discovery public key
      ansible.builtin.lineinfile:
        path: "{{ matilda_service_home }}/.ssh/authorized_keys"
        line: "{{ matilda_public_key }}"
        state: absent
      when:
        - matilda_rollback_mode == 'remove_key'
        - matilda_authorized_keys_stat.stat.exists | default(false)

    - name: Lock Matilda service account
      ansible.builtin.user:
        name: "{{ matilda_service_user }}"
        password_lock: true
        shell: /sbin/nologin
        state: present
      when: matilda_rollback_mode == 'lock_user'

    - name: Delete Matilda service account and home directory
      ansible.builtin.user:
        name: "{{ matilda_service_user }}"
        state: absent
        remove: true
        force: true
      when: matilda_rollback_mode == 'delete_user'
