---
- name: Preflight checks for Matilda Linux target preparation
  hosts: public_targets:private_targets
  gather_facts: true
  become: true

  tasks:
    - name: Show target being checked
      ansible.builtin.debug:
        msg: "Checking {{ inventory_hostname }} ansible_host={{ ansible_host }} discovery_ip={{ discovery_ip }}"

    - name: Confirm admin sudo works
      ansible.builtin.command: whoami
      register: whoami_result
      changed_when: false

    - name: Assert sudo became root
      ansible.builtin.assert:
        that:
          - whoami_result.stdout == "root"
        fail_msg: "Admin sudo failed for {{ inventory_hostname }}"

    - name: Confirm OS family is Linux-compatible
      ansible.builtin.assert:
        that:
          - ansible_facts['system'] == "Linux"
        fail_msg: "Unsupported non-Linux host: {{ inventory_hostname }}"

    - name: Confirm Probe has Matilda private key and report permissions
      ansible.builtin.command: >-
        ssh
        -i {{ matilda_probe_admin_private_key_file }}
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o LogLevel=ERROR
        {{ matilda_probe_user }}@{{ matilda_probe_ansible_host }}
        "test -f {{ matilda_probe_private_key_on_probe }} && stat -c '%a %U %G %n' {{ matilda_probe_private_key_on_probe }}"
      delegate_to: localhost
      become: false
      register: probe_key_check
      changed_when: false
      run_once: true

    - name: Show Probe key check
      ansible.builtin.debug:
        var: probe_key_check.stdout
      run_once: true

    - name: Assert Probe private key permission is 600
      ansible.builtin.assert:
        that:
          - probe_key_check.stdout.split()[0] == "600"
        fail_msg: "Probe private key exists but permissions are not 600: {{ probe_key_check.stdout }}"
      run_once: true

    - name: Detect Probe TCP check tool
      ansible.builtin.command: >-
        ssh
        -i {{ matilda_probe_admin_private_key_file }}
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o LogLevel=ERROR
        {{ matilda_probe_user }}@{{ matilda_probe_ansible_host }}
        "if command -v nc >/dev/null 2>&1; then printf 'nc:%s' \"$(command -v nc)\"; elif command -v ncat >/dev/null 2>&1; then printf 'ncat:%s' \"$(command -v ncat)\"; else exit 127; fi"
      delegate_to: localhost
      become: false
      register: probe_tcp_tool_check
      changed_when: false
      failed_when: false
      run_once: true

    - name: Assert Probe has nc or ncat for TCP reachability checks
      ansible.builtin.assert:
        that:
          - probe_tcp_tool_check.rc == 0
          - probe_tcp_tool_check.stdout | trim | length > 0
          - (probe_tcp_tool_check.stdout | trim).startswith('nc:') or (probe_tcp_tool_check.stdout | trim).startswith('ncat:')
        fail_msg: >-
          MatildaProbeVM does not have nc or ncat available for TCP/22 reachability checks.
          Install nmap-ncat on Oracle Linux / RHEL Probe hosts, then rerun preflight.
      run_once: true

    - name: Store Probe TCP check tool details
      ansible.builtin.set_fact:
        probe_tcp_tool_name: "{{ (probe_tcp_tool_check.stdout | trim).split(':', 1)[0] }}"
        probe_tcp_tool_path: "{{ (probe_tcp_tool_check.stdout | trim).split(':', 1)[1] }}"
      run_once: true

    - name: Show Probe TCP check tool
      ansible.builtin.debug:
        msg: "Using Probe TCP check tool: {{ probe_tcp_tool_name }} at {{ probe_tcp_tool_path }}"
      run_once: true

    - name: Confirm Probe can reach target discovery_ip on port 22
      ansible.builtin.command: >-
        ssh
        -i {{ matilda_probe_admin_private_key_file }}
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o LogLevel=ERROR
        {{ matilda_probe_user }}@{{ matilda_probe_ansible_host }}
        "if [ '{{ probe_tcp_tool_name }}' = 'nc' ]; then {{ probe_tcp_tool_path }} -vz {{ discovery_ip }} 22; else {{ probe_tcp_tool_path }} -v -w 5 {{ discovery_ip }} 22; fi"
      delegate_to: localhost
      become: false
      register: probe_tcp_22_check
      changed_when: false

    - name: Show Probe SSH port reachability stdout
      ansible.builtin.debug:
        var: probe_tcp_22_check.stdout_lines

    - name: Show Probe SSH port reachability stderr
      ansible.builtin.debug:
        var: probe_tcp_22_check.stderr_lines
