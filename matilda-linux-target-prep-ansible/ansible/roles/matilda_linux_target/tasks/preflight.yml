---
- name: Show target being checked
  ansible.builtin.debug:
    msg: "Checking {{ inventory_hostname }} ansible_host={{ ansible_host }} discovery_ip={{ discovery_ip }}"

- name: Confirm admin sudo works
  ansible.builtin.command: whoami
  register: whoami_result
  changed_when: false

- name: Assert sudo became root
  ansible.builtin.assert:
    that:
      - whoami_result.stdout == "root"
    fail_msg: "Admin sudo failed for {{ inventory_hostname }}"

- name: Confirm OS family is Linux-compatible
  ansible.builtin.assert:
    that:
      - ansible_facts['system'] == "Linux"
    fail_msg: "Unsupported non-Linux host: {{ inventory_hostname }}"
