name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Go and Ansible checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: matilda-discovery-readiness

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check main pull request source branch
        if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref != 'dev'
        run: |
          echo "Pull requests into main must come from dev."
          echo "Current source branch: ${{ github.head_ref }}"
          exit 1
        working-directory: .

      - name: Check local-only files remain untracked
        run: |
          forbidden="$(
            git ls-files \
              AGENTS.md \
              PLAN.md \
              matilda-discovery-readiness/.env \
              matilda-discovery-readiness/inventory.yml \
              matilda-discovery-readiness/inventory.v1.yml \
              matilda-discovery-readiness/PLAN.md \
              matilda-discovery-readiness/AGENTS.md \
              matilda-discovery-readiness/.matilda \
              matilda-discovery-readiness/.bin \
              matilda-discovery-readiness/.ansible \
              matilda-discovery-readiness/.gocache \
              matilda-discovery-readiness/dist \
              matilda-discovery-readiness/docs/matilda-docs-cache \
              matilda-discovery-readiness/reports \
            | grep -v '^matilda-discovery-readiness/reports/\.gitkeep$' || true
          )"
          if [ -n "$forbidden" ]; then
            echo "Local-only files must not be tracked:"
            echo "$forbidden"
            exit 1
          fi
        working-directory: .

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: matilda-discovery-readiness/go.mod
          cache-dependency-path: matilda-discovery-readiness/go.sum

      - name: Install Ansible
        run: |
          python3 -m pip install --user ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check pull request whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
        working-directory: .

      - name: Check push whitespace
        if: github.event_name == 'push'
        run: git diff --check "${{ github.event.before }}..${{ github.sha }}"
        working-directory: .

      - name: Run Go tests
        run: go test ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Check launcher syntax
        run: bash -n matilda-prep

      - name: Check Linux Ansible syntax
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
          ANSIBLE_LOCAL_TEMP: /tmp/matilda-ansible-local
        run: |
          ansible-playbook -i tests/fixtures/ansible-runner-inventory.yml --syntax-check ansible/playbooks/linux/preflight.yml
          ansible-playbook -i tests/fixtures/ansible-runner-inventory.yml --syntax-check ansible/playbooks/linux/setup.yml
          ansible-playbook -i tests/fixtures/ansible-runner-inventory.yml --syntax-check ansible/playbooks/linux/validate.yml
          ansible-playbook -i tests/fixtures/ansible-runner-inventory.yml --syntax-check ansible/playbooks/linux/rollback.yml
