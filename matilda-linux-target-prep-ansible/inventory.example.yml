all:
  children:
    public_targets:
      hosts:
        example-public-target:
          # Public-subnet VM.
          # Ansible connects directly from the operator machine to ansible_host.
          ansible_host: <target-public-ip>
          public_ip: <target-public-ip>
          private_ip: <target-private-ip>

          # IP MatildaProbeVM should use for discovery.
          # Prefer private IP when MatildaProbeVM can reach it.
          discovery_ip: <target-private-or-public-ip-used-by-probe>

    private_targets:
      hosts:
        example-private-target:
          # Private-subnet VM.
          # Ansible connects through MatildaProbeVM using group_vars/private_targets.yml.
          ansible_host: <target-private-ip>
          private_ip: <target-private-ip>

          # Private-only VM, so discovery uses private IP.
          discovery_ip: <target-private-ip>
